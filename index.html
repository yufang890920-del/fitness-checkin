<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>力量 + 瑜伽 · 每日打卡</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  :root{
    --bg:#0f1115; --card:#1a1d24; --card2:#22262f; --line:#2c313c;
    --txt:#eef1f6; --sub:#9aa3b2; --accent:#7c5cff; --accent2:#36d1a0; --warn:#ffb454; --red:#ff6b6b;
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg); color:var(--txt); line-height:1.5;
    max-width:480px; margin:0 auto; padding:18px 16px 70px;
  }
  h1{font-size:20px; font-weight:700; letter-spacing:.5px;}
  .muted{color:var(--sub); font-size:13px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px; margin-top:14px;}
  .row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .pill{display:inline-block; font-size:12px; padding:3px 10px; border-radius:999px; background:var(--card2); color:var(--sub);}
  .pill.s{background:rgba(124,92,255,.18); color:#b9a6ff;}
  .pill.y{background:rgba(54,209,160,.16); color:#7ee8c5;}
  .pill.r{background:rgba(255,180,84,.16); color:#ffcd85;}
  .focus{font-size:22px; font-weight:700; margin:6px 0 2px;}
  .ex{margin-top:12px;}
  .ex-item{border-bottom:1px solid var(--line);}
  .ex-item:last-child{border-bottom:none;}
  .ex-head{display:flex; justify-content:space-between; align-items:center; padding:13px 0; cursor:pointer; gap:10px;}
  .ex-head .nm{font-size:15px; display:flex; align-items:center; gap:7px;}
  .ex-head .caret{color:var(--sub); font-size:12px; transition:transform .2s;}
  .ex-item.open .caret{transform:rotate(180deg);}
  .ex-head .set{color:var(--sub); font-size:13px; white-space:nowrap;}
  .ex-detail{display:none; padding:4px 0 16px;}
  .ex-item.open .ex-detail{display:block;}
  .demo-wrap{background:var(--card2); border-radius:12px; padding:10px; display:flex; gap:12px; align-items:center;}
  .demo-wrap svg{width:120px; height:120px; flex-shrink:0; background:#15171d; border-radius:10px;}
  .demo-meta{font-size:13px;}
  .demo-meta .m{color:var(--accent2); font-weight:600; margin-bottom:4px;}
  .cues{margin-top:12px; font-size:13.5px;}
  .cues .t{font-weight:600; margin-bottom:5px; display:flex; align-items:center; gap:6px;}
  .cues ul{list-style:none; padding-left:0;}
  .cues li{padding:3px 0 3px 18px; position:relative; color:#cdd3df;}
  .cues li::before{content:"›"; position:absolute; left:4px; color:var(--accent2);}
  .cues.bad li::before{content:"✕"; color:var(--red); font-size:11px; left:5px; top:5px;}
  .ex-btns{display:flex; gap:8px; margin-top:12px;}
  .ex-btns button, .ex-btns a{flex:1; text-align:center; text-decoration:none; padding:10px; border-radius:10px; font-size:13px; font-weight:600; background:var(--card2); color:var(--txt); border:1px solid var(--line);}
  .ex-btns .rest-set{background:rgba(124,92,255,.18); color:#c4b4ff; border-color:transparent;}
  .tip{background:var(--card2); border-radius:12px; padding:12px 14px; margin-top:14px; font-size:13px; color:#cdd3df;}
  .tip b{color:var(--accent2);}
  button{font-family:inherit; cursor:pointer; border:none; border-radius:12px; font-size:15px; font-weight:600;}
  .btn-main{width:100%; padding:15px; background:linear-gradient(135deg,var(--accent),#9b7bff); color:#fff; margin-top:16px; font-size:16px;}
  .btn-main:active{transform:scale(.99);}
  .btn-main.done{background:linear-gradient(135deg,#2a7d63,var(--accent2));}
  .btn-ghost{background:var(--card2); color:var(--txt); padding:12px; width:100%; margin-top:10px;}

  .timer-card{text-align:center;}
  .timer-disp{font-size:64px; font-weight:800; letter-spacing:2px; font-variant-numeric:tabular-nums; margin:6px 0; color:var(--accent2);}
  .timer-disp.warn{color:var(--warn);}
  .presets{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:6px 0 12px;}
  .preset{padding:8px 14px; border-radius:999px; background:var(--card2); color:var(--sub); font-size:14px; border:1px solid var(--line); cursor:pointer;}
  .preset.active{background:rgba(124,92,255,.2); color:#c4b4ff; border-color:transparent;}
  .timer-ctrl{display:flex; gap:8px;}
  .timer-ctrl button{flex:1; padding:13px;}
  .t-start{background:linear-gradient(135deg,var(--accent),#9b7bff); color:#fff;}
  .t-reset{background:var(--card2); color:var(--txt);}
  .adj{display:flex; gap:8px; justify-content:center; margin-bottom:10px;}
  .adj button{background:var(--card2); color:var(--sub); padding:6px 14px; border-radius:8px; font-size:13px;}

  .stats{display:flex; gap:10px; margin-top:14px;}
  .stat{flex:1; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px 10px; text-align:center;}
  .stat .n{font-size:26px; font-weight:800; color:var(--accent2);}
  .stat .l{font-size:12px; color:var(--sub); margin-top:2px;}
  .week{display:flex; gap:6px; margin-top:14px; justify-content:space-between;}
  .day{flex:1; text-align:center;}
  .day .dot{width:30px; height:30px; line-height:30px; border-radius:50%; margin:4px auto 0; background:var(--card2); color:var(--sub); font-size:13px;}
  .day .dot.on{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font-weight:700;}
  .day .dot.today{box-shadow:0 0 0 2px var(--accent);}
  .day .lab{font-size:11px; color:var(--sub);}
  label.fld{display:block; font-size:13px; color:var(--sub); margin:14px 0 6px;}
  input[type=text],select{width:100%; padding:11px 12px; background:var(--card2); border:1px solid var(--line); border-radius:10px; color:var(--txt); font-size:15px; font-family:inherit;}
  .sec-title{font-size:15px; font-weight:700; margin-top:26px; display:flex; align-items:center; gap:8px;}
  .sec-title::before{content:""; width:4px; height:16px; background:var(--accent); border-radius:2px;}
  canvas{width:100%; border-radius:14px; margin-top:14px; display:none; border:1px solid var(--line);}
  .toast{position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px); background:#2a2f3a; color:#fff; padding:12px 20px; border-radius:999px; font-size:14px; opacity:0; transition:.3s; pointer-events:none; z-index:99;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  footer{text-align:center; color:var(--sub); font-size:11px; margin-top:30px;}

  .demoA{animation:fadeA 2.2s infinite;}
  .demoB{animation:fadeB 2.2s infinite;}
  @keyframes fadeA{0%,35%{opacity:1}50%,85%{opacity:0}100%{opacity:1}}
  @keyframes fadeB{0%,35%{opacity:0}50%,85%{opacity:1}100%{opacity:0}}
  .demoHold{animation:hold 3s ease-in-out infinite;}
  @keyframes hold{0%,100%{opacity:.55}50%{opacity:1}}
</style>
</head>
<body>

<div class="row">
  <div>
    <h1>💪 力量 + 瑜伽</h1>
    <div class="muted" id="today-date">—</div>
  </div>
  <span class="pill" id="place-pill">—</span>
</div>

<div class="card">
  <div class="row">
    <span class="pill" id="type-pill">今日</span>
    <span class="muted" id="week-name">—</span>
  </div>
  <div class="focus" id="focus">—</div>
  <div class="muted" id="sub-focus"></div>
  <div class="ex" id="ex-list"></div>
  <div class="tip" id="tip"></div>
  <button class="btn-main" id="checkin-btn">今天还没打卡 · 点我打卡 ✓</button>
</div>

<div class="sec-title">⏱ 组间休息计时器</div>
<div class="card timer-card">
  <div class="presets" id="presets"></div>
  <div class="timer-disp" id="timer-disp">01:00</div>
  <div class="adj">
    <button id="minus">− 15 秒</button>
    <button id="plus">+ 15 秒</button>
  </div>
  <div class="timer-ctrl">
    <button class="t-start" id="t-start">开始</button>
    <button class="t-reset" id="t-reset">重置</button>
  </div>
  <div class="muted" style="margin-top:10px;">练完一组就开始倒数，到点会响铃提醒你下一组</div>
</div>

<div class="sec-title">我的进度</div>
<div class="stats">
  <div class="stat"><div class="n" id="stat-total">0</div><div class="l">累计打卡</div></div>
  <div class="stat"><div class="n" id="stat-week">0</div><div class="l">本周完成</div></div>
  <div class="stat"><div class="n" id="stat-streak">0</div><div class="l">连续天数</div></div>
</div>
<div class="card">
  <div class="muted">最近 7 天</div>
  <div class="week" id="week-grid"></div>
</div>

<div class="sec-title">生成朋友圈打卡图</div>
<div class="card">
  <label class="fld">你的昵称（会显示在图上）</label>
  <input type="text" id="nick" placeholder="比如：阿福" maxlength="12">
  <label class="fld">今天练的是</label>
  <select id="img-type">
    <option value="auto">跟随今日计划</option>
    <option value="strengthA">力量 · 下肢 + 核心</option>
    <option value="strengthB">力量 · 上肢推 + 拉</option>
    <option value="yoga">瑜伽 · 身心觉察</option>
    <option value="recovery">恢复 · 拉伸放松</option>
    <option value="free">自由训练</option>
  </select>
  <button class="btn-ghost" id="gen-btn">🎨 生成打卡图</button>
  <canvas id="card-canvas" width="1080" height="1440"></canvas>
  <button class="btn-ghost" id="save-btn" style="display:none;">⬇️ 保存图片 / 下载</button>
</div>

<footer>数据只保存在本机浏览器 · 换设备或清缓存会丢失</footer>
<div class="toast" id="toast"></div>

<script>

function fig(p,eq,single){
  const c='var(--accent2)', e='var(--warn)';
  const L=(a,b)=>`<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="${c}" stroke-width="6" stroke-linecap="round"/>`;
  const PL=(pts)=>`<polyline points="${pts.map(q=>q[0]+','+q[1]).join(' ')}" fill="none" stroke="${c}" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>`;
  let s='';
  s+=`<circle cx="${p.head[0]}" cy="${p.head[1]}" r="11" fill="none" stroke="${c}" stroke-width="6"/>`;
  s+=L(p.S,p.H);
  s+=PL([p.S,p.eL,p.hL]);
  if(!single) s+=PL([p.S,p.eR,p.hR]);
  s+=PL([p.H,p.kL,p.fL]);
  if(!single) s+=PL([p.H,p.kR,p.fR]);
  if(eq==='db'){ s+=`<rect x="${p.hL[0]-9}" y="${p.hL[1]-4}" width="18" height="8" rx="3" fill="${e}"/>`; if(!single) s+=`<rect x="${p.hR[0]-9}" y="${p.hR[1]-4}" width="18" height="8" rx="3" fill="${e}"/>`; }
  if(eq==='chest'){ const mx=(p.hL[0]+p.hR[0])/2, my=(p.hL[1]+p.hR[1])/2; s+=`<rect x="${mx-12}" y="${my-5}" width="24" height="10" rx="3" fill="${e}"/>`; }
  if(eq==='bar'){ s+=`<line x1="${p.hL[0]-6}" y1="${p.hL[1]}" x2="${p.hR[0]+6}" y2="${p.hR[1]}" stroke="${e}" stroke-width="6" stroke-linecap="round"/>`; }
  if(eq==='cable'){ s+=`<circle cx="${p.hL[0]}" cy="${p.hL[1]}" r="6" fill="${e}"/><line x1="${p.hL[0]}" y1="${p.hL[1]}" x2="185" y2="96" stroke="${e}" stroke-width="3" stroke-dasharray="4 4"/><rect x="183" y="80" width="8" height="34" rx="2" fill="#3a3f4a"/>`; }
  return s;
}
function demoSVG(pat){
  const P=POSES[pat]; if(!P) return '';
  let inner='';
  if(P.bench){ inner+=`<rect x="40" y="150" width="100" height="7" rx="3" fill="#3a3f4a"/>`; }
  else if(pat==='plank'){ inner+=`<line x1="20" y1="172" x2="180" y2="172" stroke="#3a3f4a" stroke-width="3"/>`; }
  else { inner+=`<line x1="40" y1="186" x2="160" y2="186" stroke="#3a3f4a" stroke-width="3"/>`; }
  if(P.hold){ inner+=`<g class="demoHold">${fig(P.a,P.eq,P.single)}</g>`; }
  else { inner+=`<g class="demoA">${fig(P.a,P.eq,P.single)}</g><g class="demoB">${fig(P.b,P.eq,P.single)}</g>`; }
  return `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
}

/* ========== 工具 ========== */
const WD=['周日','周一','周二','周三','周四','周五','周六'];
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function load(){try{return JSON.parse(localStorage.getItem('fit_checkins')||'{}');}catch(e){return {};}}
function save(o){localStorage.setItem('fit_checkins',JSON.stringify(o));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
function biliLink(q){return 'https://search.bilibili.com/all?keyword='+encodeURIComponent(q);}
const ZOEY_UID='62540916'; // 周六野 Zoey
function bandLink(kw){return 'https://space.bilibili.com/'+ZOEY_UID+'/search/video?keyword='+encodeURIComponent(kw);}
const ZKEY={'高脚杯深蹲':'深蹲','罗马尼亚硬拉（哑铃）':'臀腿','腿举机':'腿','坐姿划船':'背','平板支撑':'核心','哑铃卧推':'胸','高位下拉':'背','坐姿肩推（哑铃）':'肩','面拉':'肩','二头弯举 + 三头下压':'手臂','弹力绳深蹲':'弹力带 腿','弹力绳划船':'弹力带 背','弹力绳侧平举':'弹力带 肩'};

let data=load();
const dow=new Date().getDay();
const plan=PLAN[dow]||REST_PLAN;

/* ========== 渲染今日 ========== */
function renderToday(){
  const d=new Date();
  document.getElementById('today-date').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${WD[dow]}`;
  document.getElementById('week-name').textContent=WD[dow];
  document.getElementById('place-pill').textContent=plan.place;
  const tp=document.getElementById('type-pill');tp.textContent=plan.type;tp.className='pill '+plan.cls;
  document.getElementById('focus').textContent=plan.focus;
  document.getElementById('sub-focus').textContent=plan.sub;
  document.getElementById('tip').innerHTML='💡 '+plan.tip;
  const box=document.getElementById('ex-list');box.innerHTML='';
  plan.ex.forEach(([name,sets])=>{
    const dd=EX[name];
    const item=document.createElement('div');item.className='ex-item';
    const caret=dd?'<span class="caret">▼</span>':'';
    let detail='';
    if(dd){
      detail=`<div class="ex-detail">
        <div class="demo-wrap">${demoSVG(dd.pat)}<div class="demo-meta"><div class="m">🎯 ${dd.m}</div><div class="muted">建议组间休息 ${dd.rest} 秒</div></div></div>
        <div class="cues"><div class="t">✅ 动作要领</div><ul>${dd.cues.map(c=>`<li>${c}</li>`).join('')}</ul></div>
        <div class="cues bad"><div class="t">⚠️ 常见错误</div><ul>${dd.bad.map(c=>`<li>${c}</li>`).join('')}</ul></div>
        <div class="ex-btns">
          <button class="rest-set" data-rest="${dd.rest}">用 ${dd.rest}s 间歇</button>
          <a href="${bandLink(ZKEY[name]||'弹力带')}" target="_blank" rel="noopener">▶ 看周六野示范</a>
        </div>
      </div>`;
    }
    item.innerHTML=`<div class="ex-head"><span class="nm">${dd?'🏋️':'•'} ${name} ${caret}</span><span class="set">${sets}</span></div>${detail}`;
    if(dd){ item.querySelector('.ex-head').onclick=()=>item.classList.toggle('open'); }
    box.appendChild(item);
  });
  box.querySelectorAll('.rest-set').forEach(b=>b.onclick=(e)=>{e.stopPropagation();setTimer(parseInt(b.dataset.rest));startTimer();toast('计时开始：'+b.dataset.rest+' 秒');document.querySelector('.timer-card').scrollIntoView({behavior:'smooth',block:'center'});});
  if(plan.yogaVideo){
    const a=document.createElement('a');a.href=(plan.yogaVideo.indexOf('http')===0?plan.yogaVideo:biliLink(plan.yogaVideo));a.target='_blank';a.rel='noopener';
    a.className='btn-ghost';a.style.display='block';a.style.textAlign='center';a.style.textDecoration='none';a.textContent='▶ 打开 Yue Yoga 跟练视频';
    document.getElementById('tip').parentNode.insertBefore(a,document.getElementById('tip'));
  }
  const nk=localStorage.getItem('fit_nick');if(nk)document.getElementById('nick').value=nk;
  renderCheckBtn();
}
function renderCheckBtn(){
  const btn=document.getElementById('checkin-btn');
  if(data[todayStr()]){btn.textContent='✅ 今天已打卡，干得漂亮！';btn.classList.add('done');}
  else{btn.textContent='今天还没打卡 · 点我打卡 ✓';btn.classList.remove('done');}
}

/* ========== 计时器 ========== */
let tSec=60, tRemain=60, tInt=null, tRunning=false;
const PRESETS=[30,45,60,75,90];
function fmtT(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function renderPresets(){
  const box=document.getElementById('presets');box.innerHTML='';
  PRESETS.forEach(s=>{const b=document.createElement('div');b.className='preset'+(s===tSec?' active':'');b.textContent=s+'s';b.onclick=()=>{setTimer(s);};box.appendChild(b);});
}
function renderTimer(){
  const d=document.getElementById('timer-disp');d.textContent=fmtT(tRemain);
  d.className='timer-disp'+(tRunning&&tRemain<=5?' warn':'');
}
function setTimer(s){tSec=s;tRemain=s;stopTimer();renderPresets();renderTimer();}
function startTimer(){
  if(tRunning)return;
  if(tRemain<=0){tRemain=tSec;}
  tRunning=true;document.getElementById('t-start').textContent='暂停';
  tInt=setInterval(()=>{tRemain--;renderTimer();if(tRemain<=0){finishTimer();}},1000);
  renderTimer();
}
function pauseTimer(){tRunning=false;clearInterval(tInt);document.getElementById('t-start').textContent='继续';renderTimer();}
function stopTimer(){tRunning=false;clearInterval(tInt);document.getElementById('t-start').textContent='开始';}
function finishTimer(){clearInterval(tInt);tRunning=false;document.getElementById('t-start').textContent='开始';tRemain=0;renderTimer();beep();if(navigator.vibrate)navigator.vibrate([200,100,200]);toast('休息结束，开始下一组！💪');}
function beep(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();[0,0.18,0.36].forEach(t=>{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=880;o.type='sine';g.gain.setValueAtTime(0.001,ac.currentTime+t);g.gain.exponentialRampToValueAtTime(0.4,ac.currentTime+t+0.02);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+t+0.15);o.start(ac.currentTime+t);o.stop(ac.currentTime+t+0.16);});}catch(e){}}
document.getElementById('t-start').onclick=()=>{tRunning?pauseTimer():startTimer();};
document.getElementById('t-reset').onclick=()=>{setTimer(tSec);};
document.getElementById('plus').onclick=()=>{tRemain+=15;tSec=tRemain;renderTimer();renderPresets();};
document.getElementById('minus').onclick=()=>{tRemain=Math.max(5,tRemain-15);tSec=tRemain;renderTimer();renderPresets();};

/* ========== 统计 ========== */
function renderStats(){
  const keys=Object.keys(data);
  document.getElementById('stat-total').textContent=keys.length;
  const now=new Date();const day=(now.getDay()+6)%7;const mon=new Date(now);mon.setDate(now.getDate()-day);mon.setHours(0,0,0,0);
  let wk=0;keys.forEach(k=>{if(new Date(k+'T00:00:00')>=mon)wk++;});
  document.getElementById('stat-week').textContent=wk;
  let streak=0;let cur=new Date();cur.setHours(0,0,0,0);
  const fmt=dt=>dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
  if(!data[fmt(cur)])cur.setDate(cur.getDate()-1);
  while(data[fmt(cur)]){streak++;cur.setDate(cur.getDate()-1);}
  document.getElementById('stat-streak').textContent=streak;
  const grid=document.getElementById('week-grid');grid.innerHTML='';
  for(let i=6;i>=0;i--){const dt=new Date();dt.setDate(dt.getDate()-i);const ds=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
    const on=!!data[ds];const isT=i===0;const el=document.createElement('div');el.className='day';
    el.innerHTML=`<div class="lab">${WD[dt.getDay()]}</div><div class="dot ${on?'on':''} ${isT?'today':''}">${on?'✓':dt.getDate()}</div>`;grid.appendChild(el);}
}

/* ========== 打卡 ========== */
document.getElementById('checkin-btn').onclick=()=>{
  const t=todayStr();
  if(data[t]){if(confirm('今天已经打卡了，要取消吗？')){delete data[t];save(data);toast('已取消今天的打卡');}}
  else{data[t]={type:plan.key,focus:plan.focus};save(data);toast('打卡成功！🎉');}
  renderCheckBtn();renderStats();
};

/* ========== 生成图片 ========== */
const cv=document.getElementById('card-canvas');const ctx=cv.getContext('2d');
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function genCard(){
  const W=1080,H=1440;let sel=document.getElementById('img-type').value;let label,aTop='#7c5cff',aBot='#36d1a0';
  label=sel==='auto'?(TYPE_LABEL[plan.key]||'今日训练'):(TYPE_LABEL[sel]||'训练打卡');
  if(/瑜伽|恢复/.test(label)){aTop='#36d1a0';aBot='#3bb2ff';}
  const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#14161c');g.addColorStop(1,'#1e2230');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  const rg=ctx.createRadialGradient(W*0.8,160,40,W*0.8,160,520);rg.addColorStop(0,aTop+'55');rg.addColorStop(1,'transparent');ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
  const total=Object.keys(data).length+(data[todayStr()]?0:1);const d=new Date();const nick=(document.getElementById('nick').value||'').trim();
  ctx.textAlign='left';ctx.fillStyle='#9aa3b2';ctx.font='34px -apple-system,"PingFang SC",sans-serif';
  ctx.fillText(`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}　${WD[d.getDay()]}`,90,150);
  ctx.fillStyle='#eef1f6';ctx.font='bold 52px -apple-system,"PingFang SC",sans-serif';ctx.fillText('今日已打卡',90,240);
  const cx=W/2,cy=560,R=185;ctx.lineWidth=26;ctx.strokeStyle='#2a2f3a';ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.stroke();
  const ring=ctx.createLinearGradient(cx-R,cy-R,cx+R,cy+R);ring.addColorStop(0,aTop);ring.addColorStop(1,aBot);ctx.strokeStyle=ring;ctx.lineCap='round';ctx.beginPath();ctx.arc(cx,cy,R,-Math.PI/2,-Math.PI/2+Math.PI*1.55);ctx.stroke();
  ctx.textAlign='center';ctx.fillStyle='#9aa3b2';ctx.font='30px -apple-system,sans-serif';ctx.fillText('累计第',cx,cy-66);
  ctx.fillStyle='#fff';ctx.font='bold 150px -apple-system,sans-serif';ctx.fillText(total,cx,cy+58);
  ctx.fillStyle='#9aa3b2';ctx.font='30px -apple-system,sans-serif';ctx.fillText('次训练',cx,cy+115);
  ctx.font='bold 42px -apple-system,"PingFang SC",sans-serif';const tw=ctx.measureText(label).width;const pw=tw+90;
  roundRect(cx-pw/2,810,pw,86,43);const pg=ctx.createLinearGradient(cx-pw/2,0,cx+pw/2,0);pg.addColorStop(0,aTop);pg.addColorStop(1,aBot);ctx.fillStyle=pg;ctx.fill();
  ctx.fillStyle='#0f1115';ctx.fillText(label,cx,868);
  const keys=Object.keys(data);const now2=new Date();const day2=(now2.getDay()+6)%7;const mon2=new Date(now2);mon2.setDate(now2.getDate()-day2);mon2.setHours(0,0,0,0);
  let wk=0;keys.forEach(k=>{if(new Date(k+'T00:00:00')>=mon2)wk++;});if(!data[todayStr()])wk++;
  let streak=0;let cur=new Date();cur.setHours(0,0,0,0);const fmt=dt=>dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
  const tmp=Object.assign({},data);tmp[todayStr()]=1;while(tmp[fmt(cur)]){streak++;cur.setDate(cur.getDate()-1);}
  const cells=[['本周',wk],['连续天数',streak],['累计',total]];const bw=270,gap=30,sx=cx-(bw*3+gap*2)/2;
  cells.forEach((c,i)=>{const x=sx+i*(bw+gap);roundRect(x,960,bw,150,22);ctx.fillStyle='#22262f';ctx.fill();
    ctx.fillStyle=aBot;ctx.font='bold 64px -apple-system,sans-serif';ctx.fillText(c[1],x+bw/2,1042);
    ctx.fillStyle='#9aa3b2';ctx.font='28px -apple-system,sans-serif';ctx.fillText(c[0],x+bw/2,1086);});
  const q=QUOTES[total%QUOTES.length];ctx.fillStyle='#cdd3df';ctx.font='italic 36px -apple-system,"PingFang SC",sans-serif';ctx.fillText('“ '+q+' ”',cx,1230);
  ctx.fillStyle='#7c8090';ctx.font='30px -apple-system,sans-serif';ctx.fillText((nick?nick+' · ':'')+'力量 + 瑜伽 同步成长计划',cx,1330);
  cv.style.display='block';document.getElementById('save-btn').style.display='block';if(nick)localStorage.setItem('fit_nick',nick);
}
document.getElementById('gen-btn').onclick=genCard;
document.getElementById('save-btn').onclick=()=>{const a=document.createElement('a');a.download='健身打卡_'+todayStr()+'.png';a.href=cv.toDataURL('image/png');a.click();toast('图片已下载，去发朋友圈吧！');};

/* init */
renderPresets();renderTimer();renderToday();renderStats();
</script>
